name: T2 Build

on:
  workflow_dispatch:
  push:
    tags:
      - v.**

jobs:
  build:
    name: build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - 24.10.4
        arch:
          - aarch64_cortex-a53
          - x86_64

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Build
        uses: kenzok8/gh-action-sdk@hash
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-fchomo luci-app-homeproxy luci-app-momo luci-app-nikki luci-app-openclash luci-app-passwall luci-app-passwall2 luci-app-ssr-plus brook hysteria ipt2socks pdnsd-alt redsocks2 shadow-tls trojan tuic-client xray-plugin v2ray-core v2ray-geodata naiveproxy sing-box
          NO_REFRESH_CHECK: true
          IGNORE_ERRORS: true

      - name: Store packages
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/*.ipk

      - name: Zip packages
        run: |
          zip -j ${{ matrix.arch }}-${{ matrix.sdk }}.zip bin/packages/${{ matrix.arch }}/packages_ci/*.ipk
          echo -e "**文件说明** 🎈:\n" >> release.txt
          echo -e "1. 默认ssr与passwall的插件与依赖整合包\n" >> release.txt
          echo -e "2. 使用方法：将整合包上传到openwrt设备的tmp目录，输入命令 \`opkg install *.ipk\`\n" >> release.txt
          echo -e "3. 默认压缩包里包含ssr passwall bypass passwall2 插件\n" >> release.txt
          echo -e "4. 如果单独安装ssr与依赖，\`rm -rf {*passwall*,*bypass*,*homeproxy*}\`\n" >> release.txt
          
      - name: Upload packages
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          artifacts: "${{ matrix.arch }}-${{ matrix.sdk }}.zip,bin/packages/${{ matrix.arch }}/packages_ci/*.ipk"
          allowUpdates: true
          replacesArtifacts: true
          bodyFile: "release.txt"
          tag: ${{ github.run_number }}-${{ matrix.arch }}

      - name: Delete workflow runs
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RETAIN_DAYS: "10"
          KEEP_MINIMUM_RUNS: "2"
        run: |
          set -euo pipefail
          cutoff=$(date -u -d "${RETAIN_DAYS} days ago" +%s)
          mapfile -t runs < <(gh run list --repo "$REPO" --workflow "$WORKFLOW_NAME" --limit 200 --json databaseId,createdAt --jq '.[] | [.databaseId, .createdAt] | @tsv')
          total=${#runs[@]}
          if [ "$total" -le "$KEEP_MINIMUM_RUNS" ]; then
            echo "No workflow runs to delete ($total <= $KEEP_MINIMUM_RUNS)"
            exit 0
          fi
          index=0
          for run in "${runs[@]}"; do
            index=$((index + 1))
            if [ "$index" -le "$KEEP_MINIMUM_RUNS" ]; then
              continue
            fi
            run_id=${run%%$'\t'*}
            created_at=${run#*$'\t'}
            created_epoch=$(date -u -d "$created_at" +%s)
            if [ "$created_epoch" -gt "$cutoff" ]; then
              continue
            fi
            echo "Deleting workflow run $run_id ($created_at)"
            gh api --method DELETE "repos/$REPO/actions/runs/$run_id" || true
          done

      - name: Remove old Releases
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
          KEEP: "60"
        run: |
          set -euo pipefail
          mapfile -t tags < <(gh release list --repo "$REPO" --limit 200 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          total=${#tags[@]}
          if [ "$total" -le "$KEEP" ]; then
            echo "No old releases to delete ($total <= $KEEP)"
            exit 0
          fi
          for tag in "${tags[@]:$KEEP}"; do
            echo "Deleting $tag"
            gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag || true
          done
