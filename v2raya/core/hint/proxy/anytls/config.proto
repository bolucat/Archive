syntax = "proto3";

package v2raya.proxy.anytls;
option go_package = "github.com/v2rayA/v2raya-core/hint/proxy/anytls";

message ClientConfig {
  // Server hostname or IP
  string address = 1;
  // Server port
  uint32 port = 2;
  // Authentication password
  string password = 3;
  // TLS SNI override (optional)
  string sni = 4;
  // Allow insecure TLS (skip verification)
  bool allow_insecure = 5;
  // Minimum number of idle sessions to keep
  uint32 min_idle_sessions = 6;
}
